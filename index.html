<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>TuJo</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
  <main class="page" aria-live="polite">
    <p class="quote" id="quote">Loading quote…</p>
  </main>

  <footer class="footer">
    <p>
      Open Source Notice:
      <a href="https://github.com/its-tujo/its-tujo.github.io" target="_blank" rel="noopener">View the source on GitHub</a>
    </p>
  </footer>

  <script>
    const quotes = [
      'Simplicity is the ultimate sophistication.',
      'Less, but better.',
      'Perfection is achieved when there is nothing left to take away.',
      'The quieter you become, the more you can hear.',
      'Minimal design is maximum intention.'
    ];

    const quoteElement = document.getElementById('quote');
    quoteElement.textContent = quotes[Math.floor(Math.random() * quotes.length)];
  </script>
</body>
</html>
